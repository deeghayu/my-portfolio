<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>

    <div class="hero">
        <div class="heart"></div>
        <h1>Happy Anniversary!</h1>
        <p>You mean the world to me.</p>
        <span class="scroll-down">Scroll down to see our memories ↓</span>
    </div>

    <div class="scrapbook">
        <div class="photo-card" data-aos="fade-up">
            <img src="p1.jpg" alt="Memory">
            <p>Our First Date! ❤️</p>
        </div>
        <div class="photo-card" data-aos="fade-up">
            <img src="p2.jpg" alt="Memory">
            <p>Good Times!</p>
        </div>
        <div class="photo-card" data-aos="fade-up">
            <img src="p3.jpg" alt="Memory">
            <p>Forever Together</p>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000 });</script>
</body>
</html>
