<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Anniversary</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <div id="particles-js"></div>

    <div class="hero">
        <div class="heart"></div>
        <h1>Happy Anniversary!</h1>
        <p class="msg">"ඔයා මගේ ජීවිතේට ආපු දවසේ ඉඳන් හැමදේම ලස්සන වුණා."</p>

        <div class="love-tab">
            <div class="couple">
                <div class="person"><div class="pic"><img src="boy.jpg.png"></div><span class="sign">Sandun</span></div>
                <div class="heart-icon">❤️</div>
                <div class="person"><div class="pic"><img src="girl.jpg"></div><span class="sign">Kavindi</span></div>
            </div>
        </div>
    </div>

    <div class="scrapbook">
        <div class="photo-card" data-aos="fade-up"><img src="p1.jpg"><p>Our First Date!</p></div>
        <div class="photo-card" data-aos="fade-up"><img src="p2.jpg"><p>Good Times</p></div>
        <div class="photo-card" data-aos="fade-up"><img src="p3.jpg"><p>Forever Yours</p></div>
        <div class="photo-card" data-aos="fade-up"><img src="p3.jpg"><p>I LOVE YOU</p></div>
    </div>

    <div class="heart-gallery">
        <h2>Our Gallery</h2>
        <div class="heart-collage">
            <img src="g1.jpg" class="h-img" onclick="openFull(this.src)">
            <img src="g2.jpg" class="h-img" onclick="openFull(this.src)">
            <img src="g3.jpg" class="h-img" onclick="openFull(this.src)">
            <img src="g4.jpg" class="h-img" onclick="openFull(this.src)">
            <img src="g5.jpg" class="h-img" onclick="openFull(this.src)">
            <img src="g6.jpg" class="h-img" onclick="openFull(this.src)">
        </div>
    </div>

    <div id="fullBox" onclick="closeFull()"><img id="fullImg"></div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({duration: 1000});
        particlesJS("particles-js", {"particles":{"number":{"value":50},"color":{"value":"#ff4d6d"},"shape":{"type":"circle"}}});
        function openFull(pic){ document.getElementById("fullImg").src=pic; document.getElementById("fullBox").style.display="flex"; }
        function closeFull(){ document.getElementById("fullBox").style.display="none"; }
    </script>
</body>
</html>
